<!DOCTYPE html>
<html>

<head>
  <title>Login - Imobiliária</title>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
<link rel="stylesheet" href="./css/style.css">
</head>

<body class="login-background">

  <section class="hero is-fullheight">
    <div class="hero-body">
     <div class="container login-container">
        <div class="column is-4 is-offset-4">
          <div class="box login-card">

            <div class="login-title">
  <h1 class="brand-name">VMR</h1>
  <h2 class="brand-subtitle">Consultoria Imobiliária</h2>
</div>

            <!-- LOGIN -->
            <div class="field">
              <label class="label">Email</label>
              <div class="control">
                <input class="input" type="email" id="email">
              </div>
            </div>

            <div class="field">
              <label class="label">Senha</label>
              <div class="control">
                <input class="input" type="password" id="password">
              </div>
            </div>

            <div class="field">
              <button class="button is-dark is-fullwidth" onclick="login()">
                Entrar
              </button>
            </div>

            <hr>

            <!-- REGISTRO -->
            <div class="buttons">
              <button class="button is-light is-fullwidth" onclick="openRegister('broker')">
                Registrar como Broker
              </button>

              <button class="button is-light is-fullwidth" onclick="openRegister('client')">
                Registrar como Client
              </button>
            </div>

            <p class="has-text-danger has-text-centered mt-3" id="error"></p>

          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- MODAL REGISTRO -->
  <div class="modal" id="registerModal">
    <div class="modal-background" onclick="closeModal()"></div>
    <div class="modal-card">
      <header class="modal-card-head">
        <p class="modal-card-title">Registro</p>
        <button class="delete" onclick="closeModal()"></button>
      </header>

      <section class="modal-card-body">

        <div class="field">
          <label class="label">Nome</label>
          <div class="control">
            <input class="input" id="regName">
          </div>
        </div>

        <div class="field">
          <label class="label">Email</label>
          <div class="control">
            <input class="input" id="regEmail">
          </div>
        </div>

        <div class="field">
          <label class="label">Senha</label>
          <div class="control">
            <input class="input" type="password" id="regPassword">
          </div>
        </div>

        <div class="field" id="creciField" style="display:none;">
          <label class="label">CRECI</label>
          <div class="control">
            <input class="input" id="regCreci">
          </div>
        </div>

        <p id="registerError" class="has-text-danger"></p>

      </section>
      <footer class="modal-card-foot">
        <button class="button is-primary" onclick="register()">Registrar</button>
        <button class="button" onclick="closeModal()">Cancelar</button>
      </footer>
    </div>
  </div>

  <!-- MODAL SUCESSO -->
  <div class="modal" id="successModal">
    <div class="modal-background"></div>

    <div class="modal-card">
      <header class="modal-card-head">
        <p class="modal-card-title">Registro realizado</p>
      </header>

      <section class="modal-card-body has-text-centered">

        <p class="mb-4">
          🎉 Usuário registrado com sucesso!
        </p>

        <p>
          Agora você já pode fazer login no sistema.
        </p>

      </section>

      <footer class="modal-card-foot is-justify-content-center">

        <button class="button is-success" onclick="goToLogin()">
          Ir para Login
        </button>

        <button class="button" onclick="closeSuccessModal()">
          Registrar outro
        </button>

      </footer>
    </div>
  </div>

  <script type="module" src="./js/auth.js"></script>

</body>

</html>
